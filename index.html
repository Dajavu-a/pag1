<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="myhello">Hello</div>

    <input id="firstname" name="first" value="ทดสอบ">

    <div>
        <h1>สิ่งที่สนใจ</h1>
        <div id="Newcontent"></div>
    </div>

    <div>
        <input type="checkbox" name="interest" value="Game">Game
        <input type="checkbox" name="interest" value="book">book
        <input type="checkbox" name="interest" value="sport">sport
    </div>
    
    <button onclick="submitInterest()">แสดงสิ่งที่สนใจ</button>

    <div>
        <button onclick='buttonClick()'>click</button>
    </div>

    <div onmouseover="overitem()">
        ลากเมาส์ผ่าน
    </div>

    <div>
        <button id="submit_btn">exportdata</button>
    </div>

    <div id="hellomyname">hello<span style="display: none;">My name </span></div>
    <div id="mycontent">test</div>

    <div>html new</div>
    <a id="thislink" href="https://google.com" target="_blank">google</a>

    <script>
        console.log('Hello');

  
        let firstnameDOM = document.getElementById('firstname');
        console.log(firstnameDOM.value);


        function buttonClick() {
            console.log('young gay na baby');
        }

        function overitem() {
            console.log('เกย์อุดรยังเจ');
        }

        function submitdata() {
            console.log('เกย์รับปลื้มส่งใจแล้ว');
            btn.setAttribute('disabled', 'true');
        }

    
        const btn = document.getElementById('submit_btn');
        btn.addEventListener('click', submitdata);

  
        function submitInterest() {
            let interestDom = document.querySelectorAll('input[name=interest]');
            let contenthtml = '<ul>';
            
            for (let i = 0; i < interestDom.length; i++) {
                if (interestDom[i].checked) {
                    contenthtml += '<li>' + interestDom[i].value + '</li>';
                }
            }
            contenthtml += '</ul>'; 
            
            let contentDOM = document.getElementById('Newcontent');
            contentDOM.innerHTML = contenthtml;
        }


        let myhtml = '<ul><li>' + firstnameDOM.value + '</li></ul>';
        document.getElementById('mycontent').innerHTML = myhtml;

        let setcss = document.getElementById('myhello');
        setcss.style.backgroundColor = 'pink';
        setcss.style.color = 'yellow';

    
        let thislinkDom = document.getElementById('thislink');
        thislinkDom.setAttribute('href', 'https://www.youtube.com/watch?v=yrzJSOM9tWA');
    </script>
</body>
</html>
